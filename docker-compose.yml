services:
  db:
    image: postgres:15-alpine
    container_name: facturala-db
    environment:
      POSTGRES_DB: agente_facturacion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
